[package]
name = "xuehua"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "xh"
path = "src/main.rs"

[dependencies]
mlua = { version = "0.11.2", features = ["lua54", "send", "serde"] }
serde = { version = "1.0.219", features = ["derive"] }
clap = { version = "4.5.45", features = ["derive", "wrap_help"] }
toml = "0.9.5"
url = "2.5.6"
blake3 = "1.8.2"
crossterm = "0.29.0"
fern = "0.7.1"
log = { version = "0.4.27", features = ["kv"] }
thiserror = "2.0.16"
