[package]
name = "xh-query"
version = "0.1.0"
edition = "2024"

[features]
default = ["tokio"]
tokio = ["dep:tokio"]

[dependencies]
log.workspace = true
educe.workspace = true
rustc-hash = "2.1.1"
parking_lot = "0.12.5"
smallvec = "1.15.1"
boxcar = "0.2.14"
hashbrown = { version = "0.16.1", default-features = false, features = ["inline-more"] }
tokio = { workspace = true, optional = true }

[dev-dependencies]
arbitrary = "1.4.2"
fern = "0.7.1"
